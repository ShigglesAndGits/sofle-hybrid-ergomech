# Settings shared by both halves. Role-specific configs (central-only,
# peripheral-only) live in boards/shields/sofle_ergomech/sofle_ergomech_{left,right}.conf
# to keep Zephyr 4.1 Kconfig strict-mode happy.

# Enable the Sofle OLED Display (right shield overrides via Kconfig.defconfig)
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_BLANK_ON_IDLE=y

# Enable WPM widget
# CONFIG_ZMK_WIDGET_WPM_STATUS=y
# CONFIG_ZMK_WIDGET_LAYER_STATUS=y
# CONFIG_ZMK_WIDGET_BATTERY_STATUS=y
# CONFIG_ZMK_WIDGET_BATTERY_STATUS_SHOW_PERCENTAGE=y
# CONFIG_ZMK_WIDGET_OUTPUT_STATUS=y

# Encoders (both halves)
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# I2C bus (both halves: display on left, trackpad on right)
CONFIG_I2C=y
CONFIG_ZMK_POINTING=y

# Power management: 24h idle timeout, deep sleep disabled (CONFIG_ZMK_SLEEP unset).
# Powered by 18650s / nearly always plugged in — prioritize responsiveness over battery.
CONFIG_ZMK_IDLE_TIMEOUT=86400000

# Bluetooth signal strength optimization
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# Heavier pointing traffic over BLE benefits from a little more queue/stack headroom.
CONFIG_ZMK_BLE_THREAD_STACK_SIZE=1024
CONFIG_ZMK_BLE_MOUSE_REPORT_QUEUE_SIZE=40
CONFIG_INPUT_THREAD_STACK_SIZE=2048

# Allow more time for connection parameter negotiation at startup
CONFIG_BT_CONN_PARAM_UPDATE_TIMEOUT=5000

# Use stable static address instead of Resolvable Private Address.
# Windows/Realtek BT stacks lose IRK-based identity resolution after RPA
# rotation, treating the post-rotation address as a new device and
# dropping the bond. Static addressing sidesteps the whole problem.
CONFIG_BT_PRIVACY=n

# Allow legacy LE pairing as a fallback alongside Secure Connections.
# Zephyr 4.1 leans SC-only; Realtek chips have buggy SC implementations
# that fail the ceremony. Legacy pairing's reduced security is moot
# for a personal peripheral with a known threat model.
CONFIG_BT_SMP_SC_PAIR_ONLY=n

# Uncomment this line below to add rgb underglow / backlight support
# CONFIG_ZMK_RGB_UNDERGLOW=y

# Uncomment the line below to disable external power toggling by the underglow.
# By default toggling the underglow on and off also toggles external power
# on and off. This also causes the display to turn off.
# CONFIG_ZMK_RGB_UNDERGLOW_EXT_POWER=n
