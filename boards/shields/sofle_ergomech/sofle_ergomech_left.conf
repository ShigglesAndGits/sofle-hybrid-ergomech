# Left half: central role, has the OLED display.

# Enable nice!view display using nice-view-gem custom screen
CONFIG_ZMK_DISPLAY=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y

# Smooth scrolling is processed centrally (where pointing events resolve)
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y

# Central-side split BLE tunables
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_QUEUE_SIZE=10
CONFIG_ZMK_SPLIT_BLE_CENTRAL_SPLIT_RUN_STACK_SIZE=1024

# === DEBUG BUILD: hang diagnosis ===
# The zmk-usb-logging snippet (wired in build.yaml) handles the CDC ACM
# UART node + CONFIG_ZMK_USB_LOGGING. IMMEDIATE mode is set here because
# the snippet doesn't include it — deferred logs don't flush before a
# freeze, so we'd lose exactly the lines we need.
# Strip the snippet from build.yaml and this line once diagnosed.
CONFIG_LOG_MODE_IMMEDIATE=y
