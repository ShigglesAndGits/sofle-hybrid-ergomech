# Right half: peripheral role. Has the Cirque trackpad.
# Peripheral does not speak USB HID directly, so disable ZMK_USB to
# silence the unmet-dependency warning under Zephyr 4.1 strict mode.
CONFIG_ZMK_USB=n

# Cirque Pinnacle trackpad (upstream Zephyr 4.1 driver)
CONFIG_INPUT_PINNACLE=y

# Peripheral-side connection tuning. The fixed 7.5ms interval + zero
# latency + 4s supervision timeout are deliberately aggressive for
# split-link reliability — see config/sofle_ergomech.conf comments.
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=400
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0

# Larger peripheral buffers for bursty traffic
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_STACK_SIZE=2048
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_PRIORITY=5
CONFIG_ZMK_SPLIT_BLE_PERIPHERAL_POSITION_QUEUE_SIZE=20
